# BillFlow — Docker Compose (Supabase-backed, no local DB needed)
#
# Quick start:
#   sudo docker compose up --build
#
# Frontend: http://localhost:3000
# Backend:  http://localhost:8000
# API Docs: http://localhost:8000/api/docs

services:

  # ─── FastAPI Backend (connects to Supabase) ───────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: billflow-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      ALLOWED_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000","https://yourdomain.com"]'
    volumes:
      - ./backend:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level info

  # ─── Next.js Frontend ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: billflow-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    restart: unless-stopped
